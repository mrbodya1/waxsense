<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaxCrowd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .snowflake { font-size: 1.5rem; display: inline-block; cursor: pointer; transition: transform 0.1s; }
        .snowflake:hover { transform: scale(1.2); }
        .snowflake.active { color: #3b82f6; text-shadow: 0 0 10px rgba(59,130,246,0.5); }
        .snowflake.inactive { color: #d1d5db; }
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active { background: #fff; color: #2563eb; border-bottom: 2px solid #2563eb; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-600">❄️ WaxCrowd</a>
            <div id="authSection"></div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Реальные отчёты лыжников</h1>
            <p class="text-gray-600">Делись опытом и получай проверенные рекомендации</p>
        </div>

        <div class="flex justify-center mb-8">
            <a href="report.html" class="bg-blue-600 text-white px-8 py-4 rounded-xl text-lg font-medium hover:bg-blue-700 transition">
                + Добавить отчёт
            </a>
        </div>

        <div id="reportsList" class="space-y-4">
            <div class="text-center text-gray-500 py-8">Загрузка...</div>
        </div>
    </main>

    <script>
        (function() {
            const SUPABASE_URL = 'https://anysqgzlkwjzbkphmsdb.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_nms9x0qfeR7JmtMls6vU6Q_HzRIKaWk';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            async function updateAuthUI() {
                const { data: { user } } = await supabase.auth.getUser();
                const el = document.getElementById('authSection');
                if (user) {
                    el.innerHTML = `
                        <div class="flex items-center gap-4">
                            <a href="profile.html" class="text-gray-600">👤 Профиль</a>
                            <a href="report.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">+ Отчёт</a>
                            <button onclick="logout()" class="text-gray-500 text-sm">Выйти</button>
                        </div>
                    `;
                } else {
                    el.innerHTML = `
                        <div class="flex gap-3">
                            <a href="auth.html" class="text-gray-600">Вход</a>
                            <a href="auth.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">Регистрация</a>
                        </div>
                    `;
                }
            }

            window.logout = async () => {
                await supabase.auth.signOut();
                window.location.reload();
            };

            async function loadReports() {
                const { data: reports, error } = await supabase
                    .from('reports')
                    .select(`
                        id, report_type, start_date, country, city, location_name,
                        air_temp, track_condition, rating, comment, snowflakes_total, snowflakes_count,
                        profiles(username, full_name)
                    `)
                    .order('created_at', { ascending: false })
                    .limit(20);

                const container = document.getElementById('reportsList');
                if (error || !reports?.length) {
                    container.innerHTML = '<div class="text-center text-gray-500 py-8">Пока нет отчётов</div>';
                    return;
                }

                container.innerHTML = reports.map(r => {
                    const avg = r.snowflakes_count > 0 ? (r.snowflakes_total / r.snowflakes_count).toFixed(1) : '—';
                    const author = r.profiles?.full_name || r.profiles?.username || 'Аноним';
                    const typeIcon = r.report_type === 'glide' ? '⛷️' : '🎯';
                    const typeName = r.report_type === 'glide' ? 'Скольжение' : 'Держание';

                    return `
                        <div class="bg-white rounded-xl p-5 shadow-sm border">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <span class="text-lg mr-2">${typeIcon}</span>
                                    <span class="font-medium">${r.country}, ${r.city} — ${r.location_name}</span>
                                    <span class="text-sm text-gray-500 ml-2">${new Date(r.start_date).toLocaleDateString('ru-RU')}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-sm text-gray-500">${author}</span>
                                </div>
                            </div>
                            <div class="grid grid-cols-3 gap-4 mb-3 text-sm">
                                <div><span class="text-gray-500">Темп:</span> ${r.air_temp}°C</div>
                                <div><span class="text-gray-500">Трасса:</span> ${r.track_condition}</div>
                                <div><span class="text-gray-500">Тип:</span> ${typeName}</div>
                            </div>
                            ${r.comment ? `<p class="text-gray-700 mb-3">💬 ${r.comment}</p>` : ''}
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-2">
                                    <span class="text-yellow-500">${'❄️'.repeat(r.rating || 0)}${'⚪'.repeat(5 - (r.rating || 0))}</span>
                                    <span class="text-sm text-gray-500">(${r.rating}/5)</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-blue-500">❄️ ${avg}</span>
                                    <span class="text-xs text-gray-400">(${r.snowflakes_count} оценок)</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            updateAuthUI();
            loadReports();
        })();
    </script>
</body>
</html>

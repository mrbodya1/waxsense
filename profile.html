<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | WaxCrowd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-btn { padding: 8px 16px; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; }
        .snowflake-rating { font-size: 1.5rem; cursor: pointer; transition: transform 0.1s; }
        .snowflake-rating:hover { transform: scale(1.15); }
        .snowflake-rating.active { color: #3b82f6; }
        .snowflake-rating.inactive { color: #d1d5db; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-600">❄️ WaxCrowd</a>
            <div class="flex gap-4">
                <a href="index.html" class="text-gray-600">Главная</a>
                <a href="find.html" class="text-gray-600">Подобрать</a>
                <a href="report.html" class="text-gray-600">Добавить</a>
                <button onclick="logout()" class="text-red-600">Выйти</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        
        <!-- Профиль -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
            <div class="flex items-center gap-4">
                <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center text-3xl">👤</div>
                <div class="flex-1">
                    <h1 class="text-2xl font-bold" id="profileName"></h1>
                    <p class="text-gray-600" id="profileEmail"></p>
                    <div class="flex gap-4 mt-1">
                        <p class="text-sm text-gray-500">Отчётов: <span id="reportsCount">0</span></p>
                        <p class="text-sm text-gray-500">Рейтинг: <span id="userRating">—</span> ❄️</p>
                    </div>
                </div>
                <button onclick="toggleEdit()" class="border px-4 py-2 rounded-xl">✏️ Редактировать</button>
            </div>
        </div>

        <!-- Форма редактирования -->
        <div id="editForm" class="bg-white rounded-2xl shadow-lg p-6 mb-6 hidden">
            <h2 class="font-bold mb-4">Редактирование</h2>
            <form id="profileForm" class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="username" placeholder="Имя пользователя" class="border rounded-xl p-2">
                    <input type="text" id="fullName" placeholder="Полное имя" class="border rounded-xl p-2">
                    <input type="text" id="city" placeholder="Город" class="border rounded-xl p-2">
                </div>
                <textarea id="bio" placeholder="О себе" rows="3" class="w-full border rounded-xl p-2"></textarea>
                <div class="flex gap-3">
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-xl">Сохранить</button>
                    <button type="button" onclick="toggleEdit()" class="border px-6 py-2 rounded-xl">Отмена</button>
                </div>
            </form>
        </div>

        <!-- Вкладки -->
        <div class="flex border-b mb-4">
            <button id="tabReports" class="tab-btn active">📋 Мои отчёты</button>
            <button id="tabHistory" class="tab-btn">📜 История просмотров</button>
        </div>

        <!-- Мои отчёты -->
        <div id="reportsSection">
            <div id="userReports" class="space-y-3"></div>
        </div>

        <!-- История просмотров -->
        <div id="historySection" class="hidden">
            <div id="historyList" class="space-y-3"></div>
        </div>
    </main>

    <!-- Модалка для оценки -->
    <div id="ratingModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-6">
            <h3 class="text-xl font-bold mb-4">Оценить отчёт</h3>
            <p class="text-gray-600 mb-4" id="ratingModalReportInfo"></p>
            <div class="flex justify-center gap-3 mb-6" id="ratingStarsContainer">
                <span data-rating="1" class="snowflake-rating inactive">❄️</span>
                <span data-rating="2" class="snowflake-rating inactive">❄️</span>
                <span data-rating="3" class="snowflake-rating inactive">❄️</span>
                <span data-rating="4" class="snowflake-rating inactive">❄️</span>
                <span data-rating="5" class="snowflake-rating inactive">❄️</span>
            </div>
            <input type="hidden" id="ratingValue" value="0">
            <input type="hidden" id="ratingReportId" value="">
            <div class="flex gap-3">
                <button onclick="submitRating()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl">Оценить</button>
                <button onclick="closeRatingModal()" class="flex-1 border py-2 rounded-xl">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://anysqgzlkwjzbkphmsdb.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_nms9x0qfeR7JmtMls6vU6Q_HzRIKaWk';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            let currentUser = null;
            let currentProfile = null;
            let currentRating = 0;

            async function init() {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) { window.location.href = 'auth.html'; return; }
                currentUser = user;

                const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                if (!profile) {
                    await supabase.from('profiles').insert({ id: user.id, username: user.email, full_name: user.email });
                    currentProfile = { username: user.email, full_name: user.email, user_rating: 0 };
                } else {
                    currentProfile = profile;
                }

                document.getElementById('profileName').textContent = currentProfile.full_name || currentProfile.username;
                document.getElementById('profileEmail').textContent = user.email;
                document.getElementById('reportsCount').textContent = currentProfile.reports_count || 0;
                document.getElementById('userRating').textContent = currentProfile.user_rating?.toFixed(1) || '—';

                document.getElementById('username').value = currentProfile.username || '';
                document.getElementById('fullName').value = currentProfile.full_name || '';
                document.getElementById('city').value = currentProfile.city || '';
                document.getElementById('bio').value = currentProfile.bio || '';

                loadUserReports();
            }

            window.toggleEdit = () => document.getElementById('editForm').classList.toggle('hidden');

            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const updates = {
                    username: document.getElementById('username').value,
                    full_name: document.getElementById('fullName').value,
                    city: document.getElementById('city').value,
                    bio: document.getElementById('bio').value
                };
                await supabase.from('profiles').update(updates).eq('id', currentUser.id);
                location.reload();
            });

            // Вкладки
            document.getElementById('tabReports').addEventListener('click', () => {
                setActiveTab('reports');
            });
            document.getElementById('tabHistory').addEventListener('click', () => {
                setActiveTab('history');
            });

            function setActiveTab(tab) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
                
                document.getElementById('reportsSection').classList.toggle('hidden', tab !== 'reports');
                document.getElementById('historySection').classList.toggle('hidden', tab !== 'history');
                
                if (tab === 'history') loadHistory();
            }

            // Мои отчёты
            async function loadUserReports() {
                const { data: reports } = await supabase
                    .from('reports')
                    .select('id, report_type, start_date, country, city, location_name, air_temp, track_condition, comment, snowflakes_total, snowflakes_count')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });

                const container = document.getElementById('userReports');
                if (!reports?.length) {
                    container.innerHTML = '<div class="text-gray-500 text-center py-8">Нет отчётов</div>';
                    return;
                }

                container.innerHTML = reports.map(r => {
                    const avg = r.snowflakes_count > 0 ? (r.snowflakes_total / r.snowflakes_count).toFixed(1) : '—';
                    return `
                        <div class="bg-white rounded-xl p-4 shadow-sm border">
                            <div class="flex justify-between">
                                <span>${r.report_type === 'glide' ? '⛷️ Скольжение' : '🎯 Держание'}</span>
                                <span class="text-blue-500">❄️ ${avg} (${r.snowflakes_count})</span>
                            </div>
                            <div class="text-sm text-gray-600">${r.country}, ${r.city} — ${r.location_name} • ${new Date(r.start_date).toLocaleDateString('ru-RU')}</div>
                            <div class="text-sm">${r.air_temp}°C • ${r.track_condition}</div>
                            ${r.comment ? `<p class="text-sm mt-1 text-gray-500">💬 ${r.comment}</p>` : ''}
                        </div>
                    `;
                }).join('');
            }

            // История просмотров
            async function loadHistory() {
                const { data: history } = await supabase
                    .from('view_history')
                    .select(`
                        id, viewed_at, rated,
                        reports!inner(
                            id, report_type, start_date, country, city, location_name,
                            air_temp, track_condition, comment, snowflakes_total, snowflakes_count
                        )
                    `)
                    .eq('user_id', currentUser.id)
                    .order('viewed_at', { ascending: false });

                const container = document.getElementById('historyList');
                
                if (!history?.length) {
                    container.innerHTML = '<div class="text-gray-500 text-center py-8">История пуста</div>';
                    return;
                }

                container.innerHTML = history.map(h => {
                    const r = h.reports;
                    const avg = r.snowflakes_count > 0 ? (r.snowflakes_total / r.snowflakes_count).toFixed(1) : '—';
                    
                    return `
                        <div class="bg-white rounded-xl p-4 shadow-sm border">
                            <div class="flex justify-between items-start">
                                <div>
                                    <div class="flex items-center gap-2">
                                        <span>${r.report_type === 'glide' ? '⛷️ Скольжение' : '🎯 Держание'}</span>
                                        <span class="text-sm text-gray-400">• ${new Date(h.viewed_at).toLocaleDateString('ru-RU')}</span>
                                    </div>
                                    <div class="text-sm text-gray-600">${r.country}, ${r.city} — ${r.location_name}</div>
                                    <div class="text-sm">${r.air_temp}°C • ${r.track_condition}</div>
                                    ${r.comment ? `<p class="text-sm mt-1 text-gray-500">💬 ${r.comment}</p>` : ''}
                                </div>
                                <div class="text-right">
                                    <div class="text-blue-500">❄️ ${avg}</div>
                                    ${!h.rated ? `
                                        <button onclick="openRatingModal('${r.id}', '${r.country}, ${r.city} — ${r.location_name}')" 
                                                class="mt-2 text-sm bg-yellow-50 text-yellow-700 px-3 py-1 rounded-lg border border-yellow-200 hover:bg-yellow-100">
                                            ⭐ Оценить
                                        </button>
                                    ` : `
                                        <span class="text-sm text-green-600">✓ Оценено</span>
                                    `}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Модалка оценки
            window.openRatingModal = function(reportId, reportInfo) {
                document.getElementById('ratingReportId').value = reportId;
                document.getElementById('ratingModalReportInfo').textContent = reportInfo;
                currentRating = 0;
                document.getElementById('ratingValue').value = 0;
                
                const stars = document.querySelectorAll('#ratingStarsContainer .snowflake-rating');
                stars.forEach((s, i) => {
                    s.classList.remove('active');
                    s.classList.add('inactive');
                });
                
                stars.forEach((star, index) => {
                    star.onclick = () => {
                        currentRating = index + 1;
                        document.getElementById('ratingValue').value = currentRating;
                        stars.forEach((s, i) => {
                            s.classList.toggle('active', i < currentRating);
                            s.classList.toggle('inactive', i >= currentRating);
                        });
                    };
                });
                
                document.getElementById('ratingModal').classList.remove('hidden');
                document.getElementById('ratingModal').style.display = 'flex';
            };

            window.closeRatingModal = function() {
                document.getElementById('ratingModal').classList.add('hidden');
                document.getElementById('ratingModal').style.display = 'none';
            };

            window.submitRating = async function() {
                const reportId = document.getElementById('ratingReportId').value;
                const rating = parseInt(document.getElementById('ratingValue').value);
                
                if (rating === 0) {
                    alert('Выберите оценку!');
                    return;
                }

                // Проверяем, не оценивал ли уже
                const { data: existing } = await supabase
                    .from('report_ratings')
                    .select('id')
                    .eq('report_id', reportId)
                    .eq('user_id', currentUser.id)
                    .single();

                if (existing) {
                    alert('Вы уже оценили этот отчёт!');
                    closeRatingModal();
                    return;
                }

                // Сохраняем оценку
                await supabase.from('report_ratings').insert({
                    report_id: reportId,
                    user_id: currentUser.id,
                    rating: rating
                });

                // Отмечаем как оцененный в истории
                await supabase.from('view_history')
                    .update({ rated: true })
                    .eq('user_id', currentUser.id)
                    .eq('report_id', reportId);

                closeRatingModal();
                loadHistory();
                alert('Спасибо за оценку! ❄️');
            };

            window.logout = async () => { 
                await supabase.auth.signOut(); 
                window.location.href = 'index.html'; 
            };

            init();
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | WaxSense</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96x96.png">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WaxSense">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-btn { padding: 8px 12px; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; }
        .snowflake-rating { font-size: 1.5rem; cursor: pointer; transition: transform 0.1s, color 0.15s; color: #d1d5db; }
        .snowflake-rating:hover { transform: scale(1.15); }
        .snowflake-rating.filled { color: #3b82f6; }
        .snowflake-rating.hovered { color: #60a5fa; }
        @media (min-width: 640px) {
            .tab-btn { padding: 8px 16px; }
            .snowflake-rating { font-size: 1.8rem; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b">
        <div class="max-w-6xl mx-auto px-3 sm:px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-xl sm:text-2xl font-bold text-blue-600">WaxSense</a>
            <div class="flex gap-2 sm:gap-4">
                <a href="index.html" class="text-gray-600 text-sm sm:text-base">Главная</a>
                <a href="find.html" class="text-gray-600 text-sm sm:text-base">Подобрать</a>
                <a href="report.html" class="text-gray-600 text-sm sm:text-base">Добавить</a>
                <button onclick="logout()" class="text-red-600 text-sm sm:text-base">Выйти</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-3 sm:px-4 py-4 sm:py-8">
        
        <div class="bg-white rounded-2xl shadow-lg p-4 sm:p-6 mb-4 sm:mb-6">
            <div class="flex items-center gap-3 sm:gap-4">
                <div class="w-16 h-16 sm:w-20 sm:h-20 bg-blue-100 rounded-full flex items-center justify-center text-2xl sm:text-3xl">👤</div>
                <div class="flex-1">
                    <h1 class="text-xl sm:text-2xl font-bold" id="profileName"></h1>
                    <p class="text-gray-600 text-sm sm:text-base" id="profileEmail"></p>
                    <div class="flex gap-3 sm:gap-4 mt-1">
                        <p class="text-xs sm:text-sm text-gray-500">Отчётов: <span id="reportsCount">0</span></p>
                        <p class="text-xs sm:text-sm text-gray-500">Рейтинг: <span id="userRating">—</span> ❄️</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportToCSV()" class="border px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl text-sm sm:text-base bg-green-50 text-green-700 border-green-200 hover:bg-green-100" title="Скачать мои отчёты">📥</button>
                    <button onclick="toggleEdit()" class="border px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl text-sm sm:text-base">✏️</button>
                </div>
            </div>
        </div>

        <div id="editForm" class="bg-white rounded-2xl shadow-lg p-4 sm:p-6 mb-4 sm:mb-6 hidden">
            <h2 class="font-bold mb-3 sm:mb-4 text-base sm:text-lg">Редактирование</h2>
            <form id="profileForm" class="space-y-3">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 sm:gap-3">
                    <input type="text" id="username" placeholder="Имя пользователя" class="border rounded-xl p-2 text-sm sm:text-base">
                    <input type="text" id="fullName" placeholder="Полное имя" class="border rounded-xl p-2 text-sm sm:text-base">
                    <input type="text" id="city" placeholder="Город" class="border rounded-xl p-2 text-sm sm:text-base">
                </div>
                <textarea id="bio" placeholder="О себе" rows="3" class="w-full border rounded-xl p-2 text-sm sm:text-base"></textarea>
                <div class="flex gap-3">
                    <button type="submit" class="bg-blue-600 text-white px-4 sm:px-6 py-2 rounded-xl text-sm sm:text-base">Сохранить</button>
                    <button type="button" onclick="toggleEdit()" class="border px-4 sm:px-6 py-2 rounded-xl text-sm sm:text-base">Отмена</button>
                </div>
            </form>
        </div>

        <div class="flex border-b mb-4">
            <button id="tabReports" class="tab-btn active text-sm sm:text-base">📋 Мои отчёты</button>
            <button id="tabHistory" class="tab-btn text-sm sm:text-base">📜 История</button>
        </div>

        <div id="reportsSection">
            <div id="userReports" class="space-y-2 sm:space-y-3"></div>
        </div>

        <div id="historySection" class="hidden">
            <div id="historyList" class="space-y-2 sm:space-y-3"></div>
        </div>
    </main>

    <div id="ratingModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-4 sm:p-6">
            <h3 class="text-lg sm:text-xl font-bold mb-3 sm:mb-4">Оценить отчёт</h3>
            <p class="text-gray-600 text-sm sm:text-base mb-3 sm:mb-4" id="ratingModalReportInfo"></p>
            <div class="flex justify-center gap-1 mb-2" id="ratingStarsContainer"></div>
            <div class="text-center text-sm text-gray-500 mb-3 sm:mb-4"><span id="ratingDisplay">0</span>/10</div>
            <input type="hidden" id="ratingValue" value="0">
            <input type="hidden" id="ratingReportId" value="">
            <div class="flex gap-3">
                <button onclick="submitRating()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl text-sm sm:text-base">Оценить</button>
                <button onclick="closeRatingModal()" class="flex-1 border py-2 rounded-xl text-sm sm:text-base">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('✅ SW registered'))
                .catch(err => console.log('❌ SW error', err));
        }

        (function() {
            const SUPABASE_URL = 'https://anysqgzlkwjzbkphmsdb.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_nms9x0qfeR7JmtMls6vU6Q_HzRIKaWk';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            let currentUser = null;
            let currentProfile = null;
            let currentRating = 0;

            const weatherIcons = { 'sunny': '☀️', 'cloudy': '⛅', 'overcast': '☁️', 'light_snow': '🌨️', 'heavy_snow': '❄️', 'rain': '🌧️', 'sleet': '🌨️' };
            const weatherNames = { 'sunny': 'Солнечно', 'cloudy': 'Облачно', 'overcast': 'Пасмурно', 'light_snow': 'Слабый снег', 'heavy_snow': 'Сильный снег', 'rain': 'Дождь', 'sleet': 'Снег с дождём' };

            async function init() {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) { window.location.href = 'auth.html'; return; }
                currentUser = user;

                const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                if (!profile) {
                    await supabase.from('profiles').insert({ id: user.id, username: user.email, full_name: user.email });
                    currentProfile = { username: user.email, full_name: user.email, user_rating: 0 };
                } else {
                    currentProfile = profile;
                }

                document.getElementById('profileName').textContent = currentProfile.full_name || currentProfile.username;
                document.getElementById('profileEmail').textContent = user.email;
                document.getElementById('reportsCount').textContent = currentProfile.reports_count || 0;
                document.getElementById('userRating').textContent = currentProfile.user_rating?.toFixed(1) || '—';

                document.getElementById('username').value = currentProfile.username || '';
                document.getElementById('fullName').value = currentProfile.full_name || '';
                document.getElementById('city').value = currentProfile.city || '';
                document.getElementById('bio').value = currentProfile.bio || '';

                loadUserReports();
            }

            window.toggleEdit = () => document.getElementById('editForm').classList.toggle('hidden');

            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const updates = {
                    username: document.getElementById('username').value,
                    full_name: document.getElementById('fullName').value,
                    city: document.getElementById('city').value,
                    bio: document.getElementById('bio').value
                };
                await supabase.from('profiles').update(updates).eq('id', currentUser.id);
                location.reload();
            });

            document.getElementById('tabReports').addEventListener('click', () => setActiveTab('reports'));
            document.getElementById('tabHistory').addEventListener('click', () => setActiveTab('history'));

            function setActiveTab(tab) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
                document.getElementById('reportsSection').classList.toggle('hidden', tab !== 'reports');
                document.getElementById('historySection').classList.toggle('hidden', tab !== 'history');
                if (tab === 'history') loadHistory();
            }

            async function loadUserReports() {
                const { data: reports } = await supabase
                    .from('reports')
                    .select('id, report_type, start_date, country, city, location_name, temp_from, temp_to, weather, track_condition, comment, votes_sum, votes_count, rating')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });
            
                const container = document.getElementById('userReports');
                if (!reports?.length) {
                    container.innerHTML = '<div class="text-gray-500 text-center py-6 sm:py-8 text-sm sm:text-base">Нет отчётов</div>';
                    return;
                }
            
                container.innerHTML = reports.map(r => {
                    const avg = r.votes_count > 0 ? (r.votes_sum / r.votes_count).toFixed(1) : '—';
                    const weatherIcon = weatherIcons[r.weather] || '';
                    return `
                        <div class="bg-white rounded-xl p-3 sm:p-4 shadow-sm border">
                            <div class="flex justify-between">
                                <span class="text-sm sm:text-base">${r.report_type === 'glide' ? '⛷️ Скольжение' : '🎯 Держание'}</span>
                                <div class="flex items-center gap-2 sm:gap-3">
                                    <span class="text-yellow-500 text-sm sm:text-base">⭐ ${r.rating}/10</span>
                                    <span class="text-blue-500 text-sm sm:text-base">❄️ ${avg} (${r.votes_count})</span>
                                </div>
                            </div>
                            <div class="text-xs sm:text-sm text-gray-600">${r.country}, ${r.city} — ${r.location_name} • ${new Date(r.start_date).toLocaleDateString('ru-RU')}</div>
                            <div class="text-xs sm:text-sm flex items-center gap-2 flex-wrap">
                                <span>${r.temp_from}…${r.temp_to}°C</span>
                                ${r.weather ? `<span>${weatherIcon} ${weatherNames[r.weather] || r.weather}</span>` : ''}
                                <span>• ${r.track_condition}</span>
                            </div>
                            ${r.comment ? `<p class="text-xs sm:text-sm mt-1 text-gray-500">💬 ${r.comment}</p>` : ''}
                        </div>
                    `;
                }).join('');
            }
            
            // Экспорт отчётов в CSV (Excel)
            window.exportToCSV = async function() {
                const { data: reports } = await supabase
                    .from('reports')
                    .select('start_date, country, city, location_name, temp_from, temp_to, weather, track_condition, snow_type, rating, comment, report_type, ski_brand, ski_model, ski_base, ski_structure')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });
            
                if (!reports || reports.length === 0) {
                    alert('У вас пока нет отчётов для экспорта');
                    return;
                }
            
                // Заголовки CSV
                const headers = [
                    'Дата', 'Страна', 'Город', 'Место', 
                    'Темп. от (°C)', 'Темп. до (°C)', 'Погода', 
                    'Трасса', 'Тип снега', 'Тип смазки', 
                    'Бренд лыж', 'Модель лыж', 'База', 'Структура',
                    'Оценка (1-10)', 'Комментарий'
                ];
            
                // Функция для безопасного CSV-значения
                const escapeCSV = (val) => {
                    if (val === null || val === undefined) return '';
                    const str = String(val);
                    if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                        return '"' + str.replace(/"/g, '""') + '"';
                    }
                    return str;
                };
            
                // Погода и тип смазки в читаемом виде
                const weatherNamesExport = { 'sunny': 'Солнечно', 'cloudy': 'Облачно', 'overcast': 'Пасмурно', 'light_snow': 'Слабый снег', 'heavy_snow': 'Сильный снег', 'rain': 'Дождь', 'sleet': 'Снег с дождём' };
                const typeNames = { 'glide': 'Скольжение', 'grip': 'Держание' };
            
                // Формируем строки CSV
                const rows = reports.map(r => [
                    r.start_date ? new Date(r.start_date).toLocaleDateString('ru-RU') : '',
                    escapeCSV(r.country || ''),
                    escapeCSV(r.city || ''),
                    escapeCSV(r.location_name || ''),
                    r.temp_from ?? '',
                    r.temp_to ?? '',
                    weatherNamesExport[r.weather] || r.weather || '',
                    escapeCSV(r.track_condition || ''),
                    escapeCSV(r.snow_type || ''),
                    typeNames[r.report_type] || r.report_type || '',
                    escapeCSV(r.ski_brand || ''),
                    escapeCSV(r.ski_model || ''),
                    escapeCSV(r.ski_base || ''),
                    escapeCSV(r.ski_structure || ''),
                    r.rating ?? '',
                    escapeCSV(r.comment || '')
                ]);
            
                // Собираем CSV
                const csvContent = [headers.join(','), ...rows.map(row => row.join(','))].join('\n');
                
                // Скачиваем файл
                const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `waxsense_my_reports_${new Date().toISOString().slice(0,10)}.csv`;
                link.click();
                URL.revokeObjectURL(link.href);
            };

            async function loadHistory() {
                const { data: history } = await supabase
                    .from('view_history')
                    .select(`id, viewed_at, rated, reports!inner(id, report_type, start_date, country, city, location_name, temp_from, temp_to, weather, track_condition, comment, votes_sum, votes_count, rating)`)
                    .eq('user_id', currentUser.id)
                    .order('viewed_at', { ascending: false });

                const container = document.getElementById('historyList');
                if (!history?.length) {
                    container.innerHTML = '<div class="text-gray-500 text-center py-6 sm:py-8 text-sm sm:text-base">История пуста</div>';
                    return;
                }

                container.innerHTML = history.map(h => {
                    const r = h.reports;
                    const avg = r.votes_count > 0 ? (r.votes_sum / r.votes_count).toFixed(1) : '—';
                    const weatherIcon = weatherIcons[r.weather] || '';
                    
                    return `
                        <div class="bg-white rounded-xl p-3 sm:p-4 shadow-sm border">
                            <div class="flex justify-between items-start">
                                <div>
                                    <div class="flex items-center gap-2">
                                        <span class="text-sm sm:text-base">${r.report_type === 'glide' ? '⛷️ Скольжение' : '🎯 Держание'}</span>
                                        <span class="text-xs text-gray-400">• ${new Date(h.viewed_at).toLocaleDateString('ru-RU')}</span>
                                    </div>
                                    <div class="text-xs sm:text-sm text-gray-600">${r.country}, ${r.city} — ${r.location_name}</div>
                                    <div class="text-xs sm:text-sm flex items-center gap-2 flex-wrap">
                                        <span>${r.temp_from}…${r.temp_to}°C</span>
                                        ${r.weather ? `<span>${weatherIcon} ${weatherNames[r.weather] || r.weather}</span>` : ''}
                                        <span>• ${r.track_condition}</span>
                                    </div>
                                    <div class="text-xs sm:text-sm mt-1">
                                        <span class="text-yellow-500">⭐ ${r.rating}/10</span>
                                        <span class="text-blue-500 ml-3">❄️ ${avg} (${r.votes_count})</span>
                                    </div>
                                    ${r.comment ? `<p class="text-xs sm:text-sm mt-1 text-gray-500">💬 ${r.comment}</p>` : ''}
                                </div>
                                <div class="text-right">
                                    ${!h.rated ? `
                                        <button onclick="openRatingModal('${r.id}', '${r.country}, ${r.city} — ${r.location_name}')" class="text-xs sm:text-sm bg-yellow-50 text-yellow-700 px-2 sm:px-3 py-1 rounded-lg border border-yellow-200 hover:bg-yellow-100">⭐ Оценить</button>
                                    ` : `<span class="text-xs sm:text-sm text-green-600">✓ Оценено</span>`}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            window.openRatingModal = function(reportId, reportInfo) {
                document.getElementById('ratingReportId').value = reportId;
                document.getElementById('ratingModalReportInfo').textContent = reportInfo;
                currentRating = 0;
                document.getElementById('ratingValue').value = 0;
                document.getElementById('ratingDisplay').textContent = '0';
                
                const container = document.getElementById('ratingStarsContainer');
                container.innerHTML = '';
                
                for (let i = 1; i <= 10; i++) {
                    const star = document.createElement('span');
                    star.className = 'snowflake-rating';
                    star.innerHTML = '❄️';
                    star.dataset.rating = i;
                    
                    star.addEventListener('mouseenter', function() {
                        const rating = parseInt(this.dataset.rating);
                        container.querySelectorAll('.snowflake-rating').forEach((s, index) => {
                            if (index < rating) s.classList.add('hovered'); else s.classList.remove('hovered');
                        });
                        document.getElementById('ratingDisplay').textContent = rating;
                    });
                    
                    star.addEventListener('mouseleave', function() {
                        container.querySelectorAll('.snowflake-rating').forEach(s => s.classList.remove('hovered'));
                        document.getElementById('ratingDisplay').textContent = currentRating;
                    });
                    
                    star.addEventListener('click', function() {
                        currentRating = parseInt(this.dataset.rating);
                        document.getElementById('ratingValue').value = currentRating;
                        document.getElementById('ratingDisplay').textContent = currentRating;
                        container.querySelectorAll('.snowflake-rating').forEach((s, index) => {
                            if (index < currentRating) s.classList.add('filled'); else s.classList.remove('filled');
                        });
                    });
                    
                    container.appendChild(star);
                }
                
                document.getElementById('ratingModal').classList.remove('hidden');
                document.getElementById('ratingModal').style.display = 'flex';
            };

            window.closeRatingModal = function() {
                document.getElementById('ratingModal').classList.add('hidden');
                document.getElementById('ratingModal').style.display = 'none';
            };

            window.submitRating = async function() {
                const reportId = document.getElementById('ratingReportId').value;
                const rating = parseInt(document.getElementById('ratingValue').value);
                if (rating === 0) { alert('Выберите оценку!'); return; }

                const { data: existing } = await supabase.from('report_ratings').select('id').eq('report_id', reportId).eq('user_id', currentUser.id).single();
                if (existing) { alert('Вы уже оценили этот отчёт!'); closeRatingModal(); return; }

                await supabase.from('report_ratings').insert({ report_id: reportId, user_id: currentUser.id, rating: rating });
                await supabase.from('view_history').update({ rated: true }).eq('user_id', currentUser.id).eq('report_id', reportId);
                closeRatingModal();
                loadHistory();
                alert('Спасибо за оценку! ❄️');
            };

            window.logout = async () => { await supabase.auth.signOut(); window.location.href = 'index.html'; };

            init();
        })();
    </script>
</body>
</html>

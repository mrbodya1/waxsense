<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | WaxCrowd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-6 mt-20">
        <h1 class="text-2xl font-bold mb-6 text-center">🏔️ WaxCrowd</h1>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm mb-1">Email</label>
                <input type="email" id="email" required class="w-full border rounded p-2">
            </div>
            <div>
                <label class="block text-sm mb-1">Пароль</label>
                <input type="password" id="password" required class="w-full border rounded p-2">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">
                Войти
            </button>
            <button type="button" id="signupBtn" class="w-full border py-3 rounded-lg">
                Регистрация
            </button>
        </form>
        
        <div id="message" class="text-center text-sm mt-4"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://anysqgzlkwjzbkphmsdb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_nms9x0qfeR7JmtMls6vU6Q_HzRIKaWk';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                document.getElementById('message').innerHTML = 
                    `<span class="text-red-600">❌ ${error.message}</span>`;
            } else {
                window.location.href = 'report.html';
            }
        });

        document.getElementById('signupBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('Введите email и пароль');
                return;
            }
            
            const { error } = await supabase.auth.signUp({ email, password });
            
            if (error) {
                document.getElementById('message').innerHTML = 
                    `<span class="text-red-600">❌ ${error.message}</span>`;
            } else {
                document.getElementById('message').innerHTML = 
                    '<span class="text-green-600">✅ Проверьте email для подтверждения</span>';
            }
        });
    </script>
</body>
</html>

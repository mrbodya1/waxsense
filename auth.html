<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | WaxSense</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96x96.png">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WaxSense">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-3 sm:p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-4 sm:p-6 mt-12 sm:mt-20">
        <a href="index.html" class="text-xl sm:text-2xl font-bold text-teal-600 block text-center mb-4 sm:mb-6">WaxSense</a>
        
        <div class="flex border-b mb-4 sm:mb-6">
            <button id="loginTab" class="flex-1 py-2 text-center font-medium border-b-2 border-teal-600 text-teal-600 text-sm sm:text-base">Вход</button>
            <button id="signupTab" class="flex-1 py-2 text-center font-medium text-gray-500 text-sm sm:text-base">Регистрация</button>
        </div>
        
        <form id="loginForm" class="space-y-3 sm:space-y-4">
            <div><label class="block text-xs sm:text-sm mb-1">Email</label><input type="email" id="loginEmail" required class="w-full border rounded-lg p-2 sm:p-3 text-sm sm:text-base"></div>
            <div><label class="block text-xs sm:text-sm mb-1">Пароль</label><input type="password" id="loginPassword" required class="w-full border rounded-lg p-2 sm:p-3 text-sm sm:text-base"></div>
            <button type="submit" class="w-full bg-teal-600 text-white py-2.5 sm:py-3 rounded-lg font-bold text-sm sm:text-base">Войти</button>
        </form>
        
        <form id="signupForm" class="space-y-3 sm:space-y-4 hidden">
            <div><label class="block text-xs sm:text-sm mb-1">Email</label><input type="email" id="signupEmail" required class="w-full border rounded-lg p-2 sm:p-3 text-sm sm:text-base"></div>
            <div><label class="block text-xs sm:text-sm mb-1">Имя</label><input type="text" id="signupName" required class="w-full border rounded-lg p-2 sm:p-3 text-sm sm:text-base"></div>
            <div><label class="block text-xs sm:text-sm mb-1">Пароль</label><input type="password" id="signupPassword" required minlength="6" class="w-full border rounded-lg p-2 sm:p-3 text-sm sm:text-base"></div>
            <div><label class="block text-xs sm:text-sm mb-1">Подтвердите</label><input type="password" id="signupConfirm" required minlength="6" class="w-full border rounded-lg p-2 sm:p-3 text-sm sm:text-base"></div>
            <button type="submit" class="w-full bg-teal-600 text-white py-2.5 sm:py-3 rounded-lg font-bold text-sm sm:text-base">Зарегистрироваться</button>
        </form>
        
        <div id="message" class="text-center text-xs sm:text-sm mt-4"></div>
        <div class="mt-4 text-center"><a href="index.html" class="text-teal-600 text-xs sm:text-sm">← На главную</a></div>
    </div>

    <script>
        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                registrations.forEach(reg => reg.unregister());
            }).then(() => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('✅ SW registered'))
                    .catch(err => console.log('❌ SW error', err));
            });
        }

        (function() {
            const SUPABASE_URL = 'https://anysqgzlkwjzbkphmsdb.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_nms9x0qfeR7JmtMls6vU6Q_HzRIKaWk';
            
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            
            loginTab.addEventListener('click', () => {
                loginTab.classList.add('border-b-2', 'border-teal-600', 'text-teal-600');
                signupTab.classList.remove('border-b-2', 'border-teal-600', 'text-teal-600');
                signupTab.classList.add('text-gray-500');
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
            });
            
            signupTab.addEventListener('click', () => {
                signupTab.classList.add('border-b-2', 'border-teal-600', 'text-teal-600');
                loginTab.classList.remove('border-b-2', 'border-teal-600', 'text-teal-600');
                loginTab.classList.add('text-gray-500');
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            });
            
            // ВХОД
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                
                if (!email || !password) {
                    document.getElementById('message').innerHTML = '<span class="text-red-600">❌ Введите email и пароль</span>';
                    return;
                }
                
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                
                if (error) {
                    document.getElementById('message').innerHTML = `<span class="text-red-600">❌ ${error.message}</span>`;
                } else {
                    document.getElementById('message').innerHTML = '<span class="text-green-600">✅ Успешный вход!</span>';
                    setTimeout(() => { window.location.href = 'index.html'; }, 500);
                }
            });
            
            // РЕГИСТРАЦИЯ
            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('signupEmail').value;
                const name = document.getElementById('signupName').value;
                const password = document.getElementById('signupPassword').value;
                const confirm = document.getElementById('signupConfirm').value;
                
                if (!email || !password) {
                    document.getElementById('message').innerHTML = '<span class="text-red-600">❌ Введите email и пароль</span>';
                    return;
                }
                
                if (password !== confirm) {
                    document.getElementById('message').innerHTML = '<span class="text-red-600">❌ Пароли не совпадают</span>';
                    return;
                }
                
                const { error } = await supabase.auth.signUp({ 
                    email, 
                    password, 
                    options: { data: { full_name: name } } 
                });
                
                if (error) {
                    document.getElementById('message').innerHTML = `<span class="text-red-600">❌ ${error.message}</span>`;
                } else {
                    document.getElementById('message').innerHTML = '<span class="text-green-600">✅ Проверьте email для подтверждения!</span>';
                    setTimeout(() => { loginTab.click(); }, 2000);
                }
            });
            
            // Проверка сессии
            supabase.auth.getUser().then(({ data: { user } }) => {
                if (user) window.location.href = 'index.html';
            });
        })();
    </script>
</body>
</html>

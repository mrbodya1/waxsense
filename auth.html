<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | Waxsense</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WaxSense">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96x96.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('✅ Service Worker зарегистрирован', reg.scope))
          .catch(err => console.log('❌ Service Worker ошибка', err));
      }
    </script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-6 mt-20">
        <h1 class="text-2xl font-bold mb-6 text-center text-teal-600">❄️ Waxsense</h1>
        
        <div class="flex border-b mb-6">
            <button id="loginTab" class="flex-1 py-2 text-center font-medium border-b-2 border-teal-600 text-teal-600">Вход</button>
            <button id="signupTab" class="flex-1 py-2 text-center font-medium text-gray-500">Регистрация</button>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div><label class="block text-sm mb-1">Email</label><input type="email" id="loginEmail" required class="w-full border rounded-lg p-3"></div>
            <div><label class="block text-sm mb-1">Пароль</label><input type="password" id="loginPassword" required class="w-full border rounded-lg p-3"></div>
            <button type="submit" class="w-full bg-teal-600 text-white py-3 rounded-lg font-bold">Войти</button>
        </form>
        
        <form id="signupForm" class="space-y-4 hidden">
            <div><label class="block text-sm mb-1">Email</label><input type="email" id="signupEmail" required class="w-full border rounded-lg p-3"></div>
            <div><label class="block text-sm mb-1">Имя</label><input type="text" id="signupName" required class="w-full border rounded-lg p-3"></div>
            <div><label class="block text-sm mb-1">Пароль</label><input type="password" id="signupPassword" required minlength="6" class="w-full border rounded-lg p-3"></div>
            <div><label class="block text-sm mb-1">Подтвердите</label><input type="password" id="signupConfirm" required minlength="6" class="w-full border rounded-lg p-3"></div>
            <button type="submit" class="w-full bg-teal-600 text-white py-3 rounded-lg font-bold">Зарегистрироваться</button>
        </form>
        
        <div id="message" class="text-center text-sm mt-4"></div>
        <div class="mt-4 text-center"><a href="index.html" class="text-teal-600 text-sm">← На главную</a></div>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://anysqgzlkwjzbkphmsdb.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_nms9x0qfeR7JmtMls6vU6Q_HzRIKaWk';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            
            loginTab.addEventListener('click', () => {
                loginTab.classList.add('border-b-2', 'border-teal-600', 'text-teal-600');
                signupTab.classList.remove('border-b-2', 'border-teal-600', 'text-teal-600');
                signupTab.classList.add('text-gray-500');
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
            });
            
            signupTab.addEventListener('click', () => {
                signupTab.classList.add('border-b-2', 'border-teal-600', 'text-teal-600');
                loginTab.classList.remove('border-b-2', 'border-teal-600', 'text-teal-600');
                loginTab.classList.add('text-gray-500');
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            });
            
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const { error } = await supabase.auth.signInWithPassword({
                    email: document.getElementById('loginEmail').value,
                    password: document.getElementById('loginPassword').value
                });
                if (error) {
                    document.getElementById('message').innerHTML = `<span class="text-red-600">❌ ${error.message}</span>`;
                } else {
                    window.location.href = 'index.html';
                }
            });
            
            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('signupEmail').value;
                const name = document.getElementById('signupName').value;
                const password = document.getElementById('signupPassword').value;
                const confirm = document.getElementById('signupConfirm').value;
                
                if (password !== confirm) {
                    document.getElementById('message').innerHTML = '<span class="text-red-600">❌ Пароли не совпадают</span>';
                    return;
                }
                
                const { error } = await supabase.auth.signUp({
                    email, password,
                    options: { data: { full_name: name } }
                });
                
                if (error) {
                    document.getElementById('message').innerHTML = `<span class="text-red-600">❌ ${error.message}</span>`;
                } else {
                    document.getElementById('message').innerHTML = '<span class="text-green-600">✅ Проверьте email!</span>';
                }
            });
            
            supabase.auth.getUser().then(({ data: { user } }) => {
                if (user) window.location.href = 'index.html';
            });
        })();
    </script>
</body>
</html>

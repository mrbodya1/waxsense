<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | WaxSense</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96x96.png">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dc2626">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WaxSense Admin">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-btn { padding: 8px 12px; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn.active { color: #dc2626; border-bottom-color: #dc2626; }
        @media (min-width: 640px) {
            .tab-btn { padding: 10px 20px; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b">
        <div class="max-w-7xl mx-auto px-3 sm:px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-xl sm:text-2xl font-bold text-red-600">🛠️ WaxSense Admin</a>
            <div class="flex gap-2 sm:gap-4">
                <a href="index.html" class="text-gray-600 text-sm sm:text-base">Главная</a>
                <button onclick="logout()" class="text-red-600 text-sm sm:text-base">Выйти</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
        <div id="accessDenied" class="bg-red-50 border border-red-200 rounded-xl p-6 sm:p-8 text-center hidden">
            <h2 class="text-xl sm:text-2xl font-bold text-red-700 mb-2">⛔ Доступ запрещён</h2>
            <p class="text-red-600 text-sm sm:text-base">У вас нет прав администратора</p>
        </div>

        <div id="adminContent" class="hidden">
            <div class="flex flex-wrap border-b mb-4 sm:mb-6">
                <button id="tabSkiBrands" class="tab-btn active text-sm sm:text-base">🎿 Бренды лыж</button>
                <button id="tabSkiModels" class="tab-btn text-sm sm:text-base">📋 Модели лыж</button>
                <button id="tabWaxBrands" class="tab-btn text-sm sm:text-base">🧴 Бренды смазок</button>
                <button id="tabWaxProducts" class="tab-btn text-sm sm:text-base">🔬 Смазки</button>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-4 mb-4 sm:mb-6">
                <div class="bg-white rounded-xl p-3 sm:p-4 shadow-sm"><div class="text-xs sm:text-sm text-gray-500">Бренды лыж</div><div class="text-xl sm:text-2xl font-bold" id="countSkiBrands">0</div></div>
                <div class="bg-white rounded-xl p-3 sm:p-4 shadow-sm"><div class="text-xs sm:text-sm text-gray-500">Модели лыж</div><div class="text-xl sm:text-2xl font-bold" id="countSkiModels">0</div></div>
                <div class="bg-white rounded-xl p-3 sm:p-4 shadow-sm"><div class="text-xs sm:text-sm text-gray-500">Бренды смазок</div><div class="text-xl sm:text-2xl font-bold" id="countWaxBrands">0</div></div>
                <div class="bg-white rounded-xl p-3 sm:p-4 shadow-sm"><div class="text-xs sm:text-sm text-gray-500">Смазки</div><div class="text-xl sm:text-2xl font-bold" id="countWaxProducts">0</div></div>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50 border-b"><tr id="tableHeader"></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <div id="emptyMessage" class="text-center py-8 sm:py-12 text-gray-500 text-sm sm:text-base hidden">Нет записей для модерации</div>
            </div>
        </div>
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('✅ SW registered'))
                .catch(err => console.log('❌ SW error', err));
        }

        (function() {
            const SUPABASE_URL = 'https://anysqgzlkwjzbkphmsdb.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_nms9x0qfeR7JmtMls6vU6Q_HzRIKaWk';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            let currentUser = null;
            let isAdmin = false;
            let currentTab = 'skiBrands';

            async function checkAdmin() {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) { window.location.href = 'auth.html'; return false; }
                currentUser = user;

                const { data } = await supabase.from('admin_users').select('user_id').eq('user_id', user.id).maybeSingle();
                isAdmin = !!data;
                
                if (isAdmin) {
                    document.getElementById('adminContent').classList.remove('hidden');
                    document.getElementById('accessDenied').classList.add('hidden');
                    loadCounts();
                    loadTable();
                } else {
                    document.getElementById('adminContent').classList.add('hidden');
                    document.getElementById('accessDenied').classList.remove('hidden');
                }
                return isAdmin;
            }

            async function loadCounts() {
                const tables = ['user_ski_brands', 'user_ski_models', 'user_wax_brands', 'user_wax_products'];
                for (const table of tables) {
                    const { count } = await supabase.from(table).select('*', { count: 'exact', head: true }).eq('status', 'pending');
                    const id = 'count' + table.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('').replace('User', '');
                    const el = document.getElementById(id); if (el) el.textContent = count || 0;
                }
            }

            async function loadTable() {
                const tableName = { skiBrands: 'user_ski_brands', skiModels: 'user_ski_models', waxBrands: 'user_wax_brands', waxProducts: 'user_wax_products' }[currentTab];
                const { data } = await supabase.from(tableName).select('*').eq('status', 'pending').order('created_at', { ascending: false });

                const tbody = document.getElementById('tableBody');
                const thead = document.getElementById('tableHeader');
                const emptyMsg = document.getElementById('emptyMessage');

                if (!data || data.length === 0) { tbody.innerHTML = ''; emptyMsg.classList.remove('hidden'); return; }
                emptyMsg.classList.add('hidden');

                const headers = {
                    user_ski_brands: ['Пользователь', 'Бренд', 'Дата', ''],
                    user_ski_models: ['Пользователь', 'Бренд', 'Модель', 'Дата', ''],
                    user_wax_brands: ['Пользователь', 'Бренд', 'Дата', ''],
                    user_wax_products: ['Пользователь', 'Бренд', 'Смазка', 'Дата', '']
                }[tableName];
                thead.innerHTML = headers.map(h => `<th class="px-3 sm:px-4 py-2 sm:py-3 text-left text-xs sm:text-sm font-medium text-gray-600">${h}</th>`).join('');

                tbody.innerHTML = '';
                for (const item of data) {
                    const row = document.createElement('tr'); row.className = 'border-b hover:bg-gray-50';
                    const date = new Date(item.created_at).toLocaleDateString('ru-RU');
                    
                    if (tableName === 'user_ski_brands') {
                        row.innerHTML = `<td class="px-3 sm:px-4 py-2 sm:py-3 text-xs sm:text-sm">${item.user_id?.slice(0,8)||'—'}...</td><td class="px-3 sm:px-4 py-2 sm:py-3 font-medium text-xs sm:text-sm">${item.name}</td><td class="px-3 sm:px-4 py-2 sm:py-3 text-xs text-gray-500">${date}</td><td class="px-3 sm:px-4 py-2 sm:py-3"><button onclick="approve('${tableName}','${item.id}')" class="text-green-600 hover:text-green-800 mr-2 sm:mr-3 text-base sm:text-lg">✅</button><button onclick="reject('${tableName}','${item.id}')" class="text-red-600 hover:text-red-800 text-base sm:text-lg">❌</button></td>`;
                    } else if (tableName === 'user_ski_models') {
                        row.innerHTML = `<td class="px-3 sm:px-4 py-2 sm:py-3 text-xs sm:text-sm">${item.user_id?.slice(0,8)||'—'}...</td><td class="px-3 sm:px-4 py-2 sm:py-3 text-xs sm:text-sm">${item.brand_name}</td><td class="px-3 sm:px-4 py-2 sm:py-3 font-medium text-xs sm:text-sm">${item.model_name}</td><td class="px-3 sm:px-4 py-2 sm:py-3 text-xs text-gray-500">${date}</td><td class="px-3 sm:px-4 py-2 sm:py-3"><button onclick="approve('${tableName}','${item.id}')" class="text-green-600 hover:text-green-800 mr-2 sm:mr-3 text-base sm:text-lg">✅</button><button onclick="reject('${tableName}','${item.id}')" class="text-red-600 hover:text-red-800 text-base sm:text-lg">❌</button></td>`;
                    } else if (tableName === 'user_wax_brands') {
                        row.innerHTML = `<td class="px-3 sm:px-4 py-2 sm:py-3 text-xs sm:text-sm">${item.user_id?.slice(0,8)||'—'}...</td><td class="px-3 sm:px-4 py-2 sm:py-3 font-medium text-xs sm:text-sm">${item.name}</td><td class="px-3 sm:px-4 py-2 sm:py-3 text-xs text-gray-500">${date}</td><td class="px-3 sm:px-4 py-2 sm:py-3"><button onclick="approve('${tableName}','${item.id}')" class="text-green-600 hover:text-green-800 mr-2 sm:mr-3 text-base sm:text-lg">✅</button><button onclick="reject('${tableName}','${item.id}')" class="text-red-600 hover:text-red-800 text-base sm:text-lg">❌</button></td>`;
                    } else if (tableName === 'user_wax_products') {
                        row.innerHTML = `<td class="px-3 sm:px-4 py-2 sm:py-3 text-xs sm:text-sm">${item.user_id?.slice(0,8)||'—'}...</td><td class="px-3 sm:px-4 py-2 sm:py-3 text-xs sm:text-sm">${item.brand_name}</td><td class="px-3 sm:px-4 py-2 sm:py-3 font-medium text-xs sm:text-sm">${item.product_name}</td><td class="px-3 sm:px-4 py-2 sm:py-3 text-xs text-gray-500">${date}</td><td class="px-3 sm:px-4 py-2 sm:py-3"><button onclick="approve('${tableName}','${item.id}')" class="text-green-600 hover:text-green-800 mr-2 sm:mr-3 text-base sm:text-lg">✅</button><button onclick="reject('${tableName}','${item.id}')" class="text-red-600 hover:text-red-800 text-base sm:text-lg">❌</button></td>`;
                    }
                    tbody.appendChild(row);
                }
            }

            window.approve = async function(table, id) {
                await supabase.from(table).update({ status: 'approved', approved_at: new Date().toISOString(), approved_by: currentUser.id }).eq('id', id);
                loadCounts(); loadTable();
            };

            window.reject = async function(table, id) {
                await supabase.from(table).update({ status: 'rejected' }).eq('id', id);
                loadCounts(); loadTable();
            };

            document.getElementById('tabSkiBrands').addEventListener('click', () => switchTab('skiBrands'));
            document.getElementById('tabSkiModels').addEventListener('click', () => switchTab('skiModels'));
            document.getElementById('tabWaxBrands').addEventListener('click', () => switchTab('waxBrands'));
            document.getElementById('tabWaxProducts').addEventListener('click', () => switchTab('waxProducts'));

            function switchTab(tab) {
                currentTab = tab;
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
                loadTable();
            }

            window.logout = async () => { await supabase.auth.signOut(); window.location.href = 'index.html'; };
            checkAdmin();
        })();
    </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Фон -->
  <rect width="512" height="512" rx="100" fill="#ffffff" />
  
  <!-- Снежинка (синяя) -->
  <g transform="translate(256, 256)" stroke="#3b82f6" stroke-width="12" stroke-linecap="round">
    <!-- Вертикальная линия -->
    <line x1="0" y1="-180" x2="0" y2="180" />
    <!-- Диагональ 1 -->
    <line x1="-156" y1="-90" x2="156" y2="90" />
    <!-- Диагональ 2 -->
    <line x1="-156" y1="90" x2="156" y2="-90" />
    
    <!-- Ветки на вертикали -->
    <line x1="-40" y1="-120" x2="40" y2="-140" />
    <line x1="-40" y1="120" x2="40" y2="140" />
    
    <!-- Ветки на диагонали 1 -->
    <line x1="-130" y1="-50" x2="-100" y2="-100" />
    <line x1="130" y1="50" x2="100" y2="100" />
    
    <!-- Ветки на диагонали 2 -->
    <line x1="-130" y1="50" x2="-100" y2="100" />
    <line x1="130" y1="-50" x2="100" y2="-100" />
  </g>
  
  <!-- Точка в центре -->
  <circle cx="256" cy="256" r="20" fill="#3b82f6" />
</svg>

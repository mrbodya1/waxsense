<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить отчет | WaxCrowd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">📋 Новый отчет о смазке</h1>
        
        <form id="reportForm" class="space-y-6">
            
            <!-- 1. ОБЩЕЕ -->
            <div class="border rounded-lg p-4 bg-gray-50">
                <h2 class="font-semibold mb-3">📍 Общая информация</h2>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm mb-1">Дата старта</label>
                        <input type="date" id="startDate" required 
                               class="w-full border rounded p-2">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Место</label>
                        <select id="location" required class="w-full border rounded p-2">
                            <option value="">Выберите...</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 2. ПОГОДА -->
            <div class="border rounded-lg p-4 bg-gray-50">
                <h2 class="font-semibold mb-3">🌡️ Погодные условия</h2>
                
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-sm mb-1">Температура воздуха (°C)</label>
                        <input type="number" id="airTemp" required 
                               class="w-full border rounded p-2" step="1">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Температура снега (°C)</label>
                        <input type="number" id="snowTemp" 
                               class="w-full border rounded p-2" step="1">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Влажность (%)</label>
                        <input type="number" id="humidity" min="0" max="100"
                               class="w-full border rounded p-2">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Давление (мм рт.ст.)</label>
                        <input type="number" id="pressure"
                               class="w-full border rounded p-2">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm mb-2">Тип снега (можно несколько)</label>
                    <div id="snowTypes" class="grid grid-cols-2 gap-2">
                        <!-- Заполнится из БД -->
                    </div>
                </div>
            </div>

            <!-- 3. ЛЫЖИ -->
            <div class="border rounded-lg p-4 bg-gray-50">
                <h2 class="font-semibold mb-3">🎿 Лыжи</h2>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm mb-1">Стиль катания</label>
                        <select id="skiStyle" required class="w-full border rounded p-2">
                            <option value="">Выберите...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Бренд</label>
                        <select id="skiBrand" required class="w-full border rounded p-2">
                            <option value="">Выберите...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Модель</label>
                        <input type="text" id="skiModel" 
                               class="w-full border rounded p-2" 
                               placeholder="Например: RCS Carbonlite">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Год выпуска</label>
                        <input type="number" id="skiYear" min="2000" max="2026"
                               class="w-full border rounded p-2">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Структура</label>
                        <select id="skiStructure" class="w-full border rounded p-2">
                            <option value="">Выберите...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Тип базы</label>
                        <input type="text" id="skiBase" 
                               class="w-full border rounded p-2" 
                               placeholder="Sintered / Extruded">
                    </div>
                </div>
            </div>

            <!-- 4. СМАЗКА -->
            <div class="border rounded-lg p-4 bg-gray-50">
                <h2 class="font-semibold mb-3">🧴 Смазка</h2>
                
                <div id="waxLayers">
                    <!-- Базовый слой -->
                    <div class="border-l-4 border-blue-500 pl-3 mb-4">
                        <h3 class="font-medium mb-2">Базовый слой (грунтовка)</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <select id="baseWaxBrand" class="wax-brand border rounded p-2">
                                <option value="">Бренд</option>
                            </select>
                            <input type="text" id="baseWaxName" 
                                   placeholder="Название смазки"
                                   class="border rounded p-2">
                        </div>
                    </div>
                    
                    <!-- Основной слой -->
                    <div class="border-l-4 border-green-500 pl-3 mb-4">
                        <h3 class="font-medium mb-2">Основной слой</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <select id="mainWaxBrand" class="wax-brand border rounded p-2">
                                <option value="">Бренд</option>
                            </select>
                            <input type="text" id="mainWaxName" 
                                   placeholder="Название смазки"
                                   class="border rounded p-2">
                        </div>
                    </div>
                    
                    <!-- Верхний слой -->
                    <div class="border-l-4 border-orange-500 pl-3">
                        <h3 class="font-medium mb-2">Верхний слой (финишный)</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <select id="topWaxBrand" class="wax-brand border rounded p-2">
                                <option value="">Бренд</option>
                            </select>
                            <input type="text" id="topWaxName" 
                                   placeholder="Название смазки"
                                   class="border rounded p-2">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 5. ОЦЕНКА И ПРИМЕЧАНИЕ -->
            <div class="border rounded-lg p-4 bg-gray-50">
                <h2 class="font-semibold mb-3">⭐ Оценка</h2>
                
                <div class="mb-3">
                    <label class="block text-sm mb-2">Общая оценка (1-10)</label>
                    <div class="flex gap-2">
                        <input type="number" id="rating" min="1" max="10" required
                               class="w-24 border rounded p-2">
                        <span class="text-sm text-gray-500 self-center">/ 10</span>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm mb-2">Примечание</label>
                    <textarea id="notes" rows="3" 
                              class="w-full border rounded p-2"
                              placeholder="Особенности скольжения, управляемость..."></textarea>
                </div>
            </div>

            <!-- КНОПКИ -->
            <div class="flex gap-3">
                <button type="submit" 
                        class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">
                    💾 Сохранить отчет
                </button>
                <button type="button" onclick="window.location.href='index.html'"
                        class="px-6 py-3 border rounded-lg hover:bg-gray-50">
                    Отмена
                </button>
            </div>
            
            <div id="message" class="text-center text-sm"></div>
        </form>
    </div>

    <script>
        // Инициализация Supabase
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Загрузка справочников при старте
        async function loadReferences() {
            // Локации
            const { data: locations } = await supabase.from('locations').select('*').order('sort_order');
            const locSelect = document.getElementById('location');
            locations.forEach(l => {
                locSelect.innerHTML += `<option value="${l.id}">${l.city} - ${l.track_name}</option>`;
            });

            // Типы снега
            const { data: snowTypes } = await supabase.from('snow_types').select('*').order('sort_order');
            const snowDiv = document.getElementById('snowTypes');
            snowTypes.forEach(st => {
                snowDiv.innerHTML += `
                    <label class="flex items-center gap-2">
                        <input type="checkbox" value="${st.id}" class="snow-checkbox">
                        <span class="text-sm">${st.name}</span>
                    </label>
                `;
            });

            // Стили катания
            const { data: styles } = await supabase.from('ski_styles').select('*').order('sort_order');
            const styleSelect = document.getElementById('skiStyle');
            styles.forEach(s => {
                styleSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });

            // Структуры лыж
            const { data: structures } = await supabase.from('ski_structures').select('*').order('sort_order');
            const structSelect = document.getElementById('skiStructure');
            structures.forEach(s => {
                structSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });

            // Бренды лыж
            const { data: skiBrands } = await supabase.from('ski_brands').select('*').order('sort_order');
            const brandSelect = document.getElementById('skiBrand');
            skiBrands.forEach(b => {
                brandSelect.innerHTML += `<option value="${b.id}">${b.name}</option>`;
            });

            // Бренды смазок (для всех слоев)
            const { data: waxBrands } = await supabase.from('wax_brands').select('*').order('sort_order');
            document.querySelectorAll('.wax-brand').forEach(select => {
                waxBrands.forEach(b => {
                    select.innerHTML += `<option value="${b.id}">${b.name}</option>`;
                });
            });
        }

        // Отправка формы
        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Проверка авторизации
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                document.getElementById('message').innerHTML = 
                    '<span class="text-red-600">❌ Необходимо войти в систему</span>';
                return;
            }

            // Сбор выбранных типов снега
            const snowTypeIds = [];
            document.querySelectorAll('.snow-checkbox:checked').forEach(cb => {
                snowTypeIds.push(cb.value);
            });

            if (snowTypeIds.length === 0) {
                alert('Выберите хотя бы один тип снега');
                return;
            }

            // Данные отчета
            const reportData = {
                user_id: user.id,
                start_date: document.getElementById('startDate').value,
                location_id: document.getElementById('location').value,
                air_temp: parseInt(document.getElementById('airTemp').value),
                snow_temp: document.getElementById('snowTemp').value ? parseInt(document.getElementById('snowTemp').value) : null,
                humidity: document.getElementById('humidity').value ? parseInt(document.getElementById('humidity').value) : null,
                pressure: document.getElementById('pressure').value ? parseInt(document.getElementById('pressure').value) : null,
                snow_type_ids: snowTypeIds,
                ski_style_id: document.getElementById('skiStyle').value,
                ski_brand_id: document.getElementById('skiBrand').value,
                ski_model: document.getElementById('skiModel').value,
                ski_year: document.getElementById('skiYear').value ? parseInt(document.getElementById('skiYear').value) : null,
                ski_structure_id: document.getElementById('skiStructure').value || null,
                ski_base: document.getElementById('skiBase').value,
                rating: parseInt(document.getElementById('rating').value),
                notes: document.getElementById('notes').value
            };

            // Сохраняем отчет
            const { data: report, error: reportError } = await supabase
                .from('reports')
                .insert(reportData)
                .select()
                .single();

            if (reportError) {
                document.getElementById('message').innerHTML = 
                    `<span class="text-red-600">❌ Ошибка: ${reportError.message}</span>`;
                return;
            }

            // Сохраняем слои смазки
            const waxLayers = [];
            
            if (document.getElementById('baseWaxName').value) {
                waxLayers.push({
                    report_id: report.id,
                    layer_type: 'base',
                    wax_brand_id: document.getElementById('baseWaxBrand').value || null,
                    wax_name: document.getElementById('baseWaxName').value,
                    layer_order: 1
                });
            }
            
            if (document.getElementById('mainWaxName').value) {
                waxLayers.push({
                    report_id: report.id,
                    layer_type: 'main',
                    wax_brand_id: document.getElementById('mainWaxBrand').value || null,
                    wax_name: document.getElementById('mainWaxName').value,
                    layer_order: 2
                });
            }
            
            if (document.getElementById('topWaxName').value) {
                waxLayers.push({
                    report_id: report.id,
                    layer_type: 'top',
                    wax_brand_id: document.getElementById('topWaxBrand').value || null,
                    wax_name: document.getElementById('topWaxName').value,
                    layer_order: 3
                });
            }

            if (waxLayers.length > 0) {
                await supabase.from('wax_layers').insert(waxLayers);
            }

            document.getElementById('message').innerHTML = 
                '<span class="text-green-600">✅ Отчет успешно сохранен!</span>';
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        });

        // Загрузка при старте
        loadReferences();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый отчёт | Waxsense</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WaxSense">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('✅ Service Worker зарегистрирован', reg.scope))
          .catch(err => console.log('❌ Service Worker ошибка', err));
      }
    </script>
    <style>
        .tab-btn { padding: 12px 24px; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; }
        .slider-label { display: flex; justify-content: space-between; margin-top: 4px; font-size: 13px; color: #6b7280; }
        .suggestion-item { transition: background-color 0.15s; }
        .suggestion-item:hover { background-color: #f0fdfa !important; }
        .suggestion-item.bg-teal-100 { background-color: #ccfbf1; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b">
        <div class="max-w-4xl mx-auto px-4 py-3">
            <a href="index.html" class="text-2xl font-bold text-blue-600">❄️ Waxsense</a>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 py-6">
        <div class="bg-white rounded-2xl shadow-lg p-6">
            
            <div class="flex border-b mb-6">
                <button id="tabGlide" class="tab-btn active flex-1">⛷️ Скольжение</button>
                <button id="tabGrip" class="tab-btn flex-1">🎯 Держание</button>
            </div>

            <form id="reportForm">
                <input type="hidden" id="reportType" value="glide">

                <!-- 1. ОБЩЕЕ -->
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium mb-1">Дата старта</label>
                            <input type="date" id="startDate" required class="w-full border rounded-xl p-3">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Страна</label>
                            <select id="country" class="w-full border rounded-xl p-3">
                                <option value="Россия" selected>🇷🇺 Россия</option>
                                <option value="Финляндия">🇫🇮 Финляндия</option>
                                <option value="Швеция">🇸🇪 Швеция</option>
                                <option value="Норвегия">🇳🇴 Норвегия</option>
                                <option value="Эстония">🇪🇪 Эстония</option>
                                <option value="Казахстан">🇰🇿 Казахстан</option>
                                <option value="Беларусь">🇧🇾 Беларусь</option>
                                <option value="Другая">🌍 Другая</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="relative">
                            <label class="block text-sm font-medium mb-1">Город</label>
                            <input type="text" id="cityInput" placeholder="Начните вводить..." class="w-full border rounded-xl p-3" autocomplete="off">
                            <input type="hidden" id="cityId">
                            <input type="hidden" id="cityRegion">
                            <div id="citySuggestions" class="absolute z-50 w-full bg-white border rounded-xl shadow-lg mt-1 hidden max-h-60 overflow-y-auto"></div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Место старта</label>
                            <input type="text" id="locationName" placeholder="Лужники" required class="w-full border rounded-xl p-3">
                        </div>
                    </div>
                </div>

                <!-- 2. ПОГОДА -->
                <div class="border rounded-lg p-4 bg-gray-50 mt-4">
                    <h2 class="font-semibold mb-3">🌡️ Погодные условия</h2>
                    
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div>
                            <label class="block text-sm font-medium mb-1">Температура от: <span id="tempFromValue">-5</span>°C</label>
                            <input type="range" id="tempFrom" min="-30" max="15" value="-5" step="1" class="w-full">
                            <div class="slider-label"><span>-30°C</span><span>0°C</span><span>+15°C</span></div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Температура до: <span id="tempToValue">-2</span>°C</label>
                            <input type="range" id="tempTo" min="-30" max="15" value="-2" step="1" class="w-full">
                            <div class="slider-label"><span>-30°C</span><span>0°C</span><span>+15°C</span></div>
                        </div>
                    </div>
                    
                    <!-- Погода (слайдер) -->
                    <div>
                        <label class="block text-sm font-medium mb-1">Погода: <span id="weatherValue">☀️ Солнечно</span></label>
                        <input type="range" id="weatherSlider" min="1" max="7" value="1" step="1" class="w-full">
                        <div class="slider-label">
                            <span>☀️</span><span>⛅</span><span>☁️</span><span>🌨️</span><span>❄️</span><span>🌧️</span><span>🌨️</span>
                        </div>
                        <input type="hidden" id="weather" value="sunny">
                    </div>
                </div>

                <!-- Спойлер "Дополнительно" -->
                <div class="mt-4">
                    <button type="button" id="toggleDetails" class="text-blue-600 text-sm font-medium">▶ ⚙️ Дополнительно</button>
                </div>

                <div id="detailsSection" class="hidden space-y-4 mt-4 pt-4 border-t">
                    <div class="grid grid-cols-3 gap-3">
                        <div><label class="block text-sm mb-1">Темп. снега</label><input type="number" id="snowTemp" class="w-full border rounded-xl p-2"></div>
                        <div><label class="block text-sm mb-1">Влажность %</label><input type="number" id="humidity" min="0" max="100" class="w-full border rounded-xl p-2"></div>
                        <div><label class="block text-sm mb-1">Давление</label><input type="number" id="pressure" class="w-full border rounded-xl p-2"></div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Состояние <span id="trackLabel">трассы</span>: <span id="trackValue">Жесткая</span></label>
                        <input type="range" id="trackCondition" min="1" max="7" value="3" step="1" class="w-full">
                        <div class="slider-label">
                            <span>Лёд</span><span>Оч.жест</span><span>Жесткая</span><span>Отличная</span><span>Разбитая</span><span>Мягкая</span><span>Оч.мяг</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Тип снега: <span id="snowTypeValue">Мелкозернистый</span></label>
                        <input type="range" id="snowType" min="1" max="6" value="2" step="1" class="w-full">
                        <div class="slider-label">
                            <span>Свежий</span><span>Мелкозерн</span><span>Старый</span><span>Мокрый</span><span>Подмерз</span><span>Искусств</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="relative">
                            <label class="block text-sm mb-1">Бренд лыж</label>
                            <input type="text" id="skiBrandInput" placeholder="Выберите или введите свой" class="w-full border rounded-xl p-2" autocomplete="off">
                            <input type="hidden" id="skiBrandId">
                            <input type="hidden" id="isCustomBrand" value="false">
                            <div id="brandSuggestions" class="absolute z-40 w-full bg-white border rounded-xl shadow-lg mt-1 hidden max-h-60 overflow-y-auto"></div>
                        </div>
                        <div class="relative">
                            <label class="block text-sm mb-1">Модель лыж</label>
                            <input type="text" id="skiModelInput" placeholder="Выберите или введите свою" class="w-full border rounded-xl p-2" autocomplete="off">
                            <input type="hidden" id="skiModelId">
                            <input type="hidden" id="isCustomModel" value="false">
                            <div id="modelSuggestions" class="absolute z-40 w-full bg-white border rounded-xl shadow-lg mt-1 hidden max-h-60 overflow-y-auto"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="block text-sm mb-1">База (эпюра)</label><input type="text" id="skiBase" placeholder="28 / A5" class="w-full border rounded-xl p-2"></div>
                        <div><label class="block text-sm mb-1">Структура</label><input type="text" id="skiStructure" placeholder="P5-1" class="w-full border rounded-xl p-2"></div>
                    </div>
                </div>

                <!-- Слои смазки -->
                <div class="mt-6 pt-4 border-t">
                    <h3 class="font-medium mb-3" id="waxSectionTitle">🧴 Смазка (скольжение)</h3>
                    <div id="waxLayers"></div>
                    <button type="button" id="addLayer" class="mt-3 text-blue-600 text-sm">+ Добавить слой</button>
                </div>

                <!-- Оценка 1-10 -->
                <div class="mt-6 pt-4 border-t">
                    <label class="block text-sm font-medium mb-1">⭐ Оценка работы смазки: <span id="ratingValue">5</span>/10</label>
                    <input type="range" id="rating" min="1" max="10" value="5" step="1" class="w-full">
                    <div class="slider-label">
                        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
                    </div>
                </div>

                <!-- Комментарий -->
                <div class="mt-6 pt-4 border-t">
                    <label class="block text-sm font-medium mb-1">💬 Комментарий</label>
                    <textarea id="comment" rows="3" class="w-full border rounded-xl p-3" placeholder="Нюансы нанесения, ощущения..."></textarea>
                </div>

                <!-- Кнопки -->
                <div class="flex gap-3 mt-6">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-medium hover:bg-blue-700">💾 Сохранить отчёт</button>
                    <button type="button" onclick="window.location.href='index.html'" class="px-6 py-3 border rounded-xl hover:bg-gray-50">Отмена</button>
                </div>
                <div id="message" class="text-center text-sm mt-3"></div>
            </form>
        </div>
    </main>

    <script>
        (function() {
            const SUPABASE_URL = 'https://anysqgzlkwjzbkphmsdb.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_nms9x0qfeR7JmtMls6vU6Q_HzRIKaWk';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            async function checkAuth() {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) { window.location.href = 'auth.html'; return false; }
                return true;
            }

            let layerCount = 1;
            const trackConditions = ['Лёд', 'Очень жесткая', 'Жесткая', 'Отличная', 'Разбитая', 'Мягкая', 'Очень мягкая'];
            const snowTypes = ['Свежевыпавший', 'Мелкозернистый', 'Старый', 'Мокрый', 'Подмерзший зернистый', 'Искусственный'];
            
            const weatherOptions = [
                { value: 'sunny', label: '☀️ Солнечно' },
                { value: 'cloudy', label: '⛅ Облачно' },
                { value: 'overcast', label: '☁️ Пасмурно' },
                { value: 'light_snow', label: '🌨️ Слабый снег' },
                { value: 'heavy_snow', label: '❄️ Сильный снег' },
                { value: 'rain', label: '🌧️ Дождь' },
                { value: 'sleet', label: '🌨️ Снег с дождём' }
            ];

            document.getElementById('startDate').value = new Date().toISOString().split('T')[0];

            const tabGlide = document.getElementById('tabGlide');
            const tabGrip = document.getElementById('tabGrip');
            const reportType = document.getElementById('reportType');
            const trackLabel = document.getElementById('trackLabel');
            const waxTitle = document.getElementById('waxSectionTitle');

            tabGlide.addEventListener('click', () => {
                tabGlide.classList.add('active'); tabGrip.classList.remove('active');
                reportType.value = 'glide'; trackLabel.textContent = 'трассы';
                waxTitle.textContent = '🧴 Смазка (скольжение)'; updateLayerLabels();
            });

            tabGrip.addEventListener('click', () => {
                tabGrip.classList.add('active'); tabGlide.classList.remove('active');
                reportType.value = 'grip'; trackLabel.textContent = 'лыжни';
                waxTitle.textContent = '🎯 Смазка (держание)'; updateLayerLabels();
            });

            // Слайдеры температуры
            const tempFrom = document.getElementById('tempFrom');
            const tempTo = document.getElementById('tempTo');
            const tempFromValue = document.getElementById('tempFromValue');
            const tempToValue = document.getElementById('tempToValue');

            tempFrom.addEventListener('input', () => {
                tempFromValue.textContent = tempFrom.value;
                if (parseInt(tempFrom.value) > parseInt(tempTo.value)) {
                    tempTo.value = tempFrom.value;
                    tempToValue.textContent = tempFrom.value;
                }
            });

            tempTo.addEventListener('input', () => {
                tempToValue.textContent = tempTo.value;
                if (parseInt(tempTo.value) < parseInt(tempFrom.value)) {
                    tempFrom.value = tempTo.value;
                    tempFromValue.textContent = tempTo.value;
                }
            });

            // Слайдер погоды
            const weatherSlider = document.getElementById('weatherSlider');
            const weatherValue = document.getElementById('weatherValue');
            const weatherInput = document.getElementById('weather');

            weatherSlider.addEventListener('input', () => {
                const idx = weatherSlider.value - 1;
                weatherValue.textContent = weatherOptions[idx].label;
                weatherInput.value = weatherOptions[idx].value;
            });

            // Слайдер трассы
            const trackSlider = document.getElementById('trackCondition');
            trackSlider.addEventListener('input', () => {
                document.getElementById('trackValue').textContent = trackConditions[trackSlider.value - 1];
            });

            // Слайдер снега
            const snowSlider = document.getElementById('snowType');
            snowSlider.addEventListener('input', () => {
                document.getElementById('snowTypeValue').textContent = snowTypes[snowSlider.value - 1];
            });

            // Слайдер оценки
            const ratingSlider = document.getElementById('rating');
            const ratingValue = document.getElementById('ratingValue');
            ratingSlider.addEventListener('input', () => {
                ratingValue.textContent = ratingSlider.value;
            });

            // Спойлер
            document.getElementById('toggleDetails').addEventListener('click', function() {
                const section = document.getElementById('detailsSection');
                section.classList.toggle('hidden');
                this.textContent = section.classList.contains('hidden') ? '▶ ⚙️ Дополнительно' : '▼ ⚙️ Дополнительно';
            });

            function updateLayerLabels() {
                const isGrip = reportType.value === 'grip';
                document.querySelectorAll('.layer-header').forEach((el, i) => {
                    if (isGrip) {
                        const labels = ['База (грунт)', 'Основа', 'Финиш'];
                        el.textContent = labels[i] || `Слой ${i+1}`;
                    } else {
                        el.textContent = `Слой ${i+1}`;
                    }
                });
            }

            // Автокомплиты для смазок
            function initWaxBrandAutocomplete(inputId, suggestionsId, brandIdInput, isCustomInput) {
                const input = document.getElementById(inputId);
                const suggestionsDiv = document.getElementById(suggestionsId);
                const brandIdField = document.getElementById(brandIdInput);
                const isCustomField = document.getElementById(isCustomInput);
                let debounceTimer;
                
                input.addEventListener('input', async (e) => {
                    clearTimeout(debounceTimer);
                    const query = e.target.value.trim();
                    if (query.length < 1) { suggestionsDiv.classList.add('hidden'); return; }
                    
                    debounceTimer = setTimeout(async () => {
                        const { data: brands } = await supabase.from('wax_brands').select('id, name').ilike('name', `${query}%`).order('sort_order').limit(8);
                        const { data: userBrands } = await supabase.from('user_wax_brands').select('id, name').ilike('name', `${query}%`).eq('status', 'approved').limit(5);
                        const allBrands = [...(brands || []), ...(userBrands || [])];
                        
                        if (allBrands.length === 0) {
                            suggestionsDiv.innerHTML = `<div class="p-3 text-sm"><p class="text-gray-500 mb-2">Бренд не найден</p><button type="button" onclick="window.addCustomWaxBrand('${inputId}', '${query.replace(/'/g, "\\'")}')" class="w-full bg-teal-50 text-teal-700 px-3 py-2 rounded-lg text-sm">+ Добавить новый бренд "${query}"</button></div>`;
                            suggestionsDiv.classList.remove('hidden'); return;
                        }
                        
                        suggestionsDiv.innerHTML = allBrands.map(b => `<div class="suggestion-item px-4 py-2 hover:bg-teal-50 cursor-pointer border-b last:border-0" data-id="${b.id}" data-name="${b.name}"><span class="font-medium">${b.name}</span></div>`).join('');
                        suggestionsDiv.classList.remove('hidden');
                        
                        suggestionsDiv.querySelectorAll('.suggestion-item').forEach(el => {
                            el.addEventListener('click', () => {
                                input.value = el.dataset.name;
                                brandIdField.value = el.dataset.id;
                                isCustomField.value = 'false';
                                suggestionsDiv.classList.add('hidden');
                            });
                        });
                    }, 300);
                });
                
                document.addEventListener('click', (e) => {
                    if (!input.contains(e.target) && !suggestionsDiv.contains(e.target)) suggestionsDiv.classList.add('hidden');
                });
            }

            function initWaxProductAutocomplete(inputId, suggestionsId, productIdInput, isCustomInput, brandInputId) {
                const input = document.getElementById(inputId);
                const suggestionsDiv = document.getElementById(suggestionsId);
                const productIdField = document.getElementById(productIdInput);
                const isCustomField = document.getElementById(isCustomInput);
                const brandInput = document.getElementById(brandInputId);
                let debounceTimer;
                
                input.addEventListener('input', async (e) => {
                    clearTimeout(debounceTimer);
                    const query = e.target.value.trim();
                    const brandName = brandInput.value;
                    if (query.length < 1) { suggestionsDiv.classList.add('hidden'); return; }
                    
                    debounceTimer = setTimeout(async () => {
                        let allProducts = [];
                        if (brandName) {
                            const { data: products } = await supabase.from('wax_products').select('id, name, wax_brands!inner(name)').ilike('name', `${query}%`).eq('wax_brands.name', brandName).limit(8);
                            allProducts = products || [];
                        }
                        const { data: userProducts } = await supabase.from('user_wax_products').select('id, product_name').ilike('product_name', `${query}%`).eq('status', 'approved').eq('brand_name', brandName).limit(5);
                        if (userProducts) allProducts = [...allProducts, ...userProducts.map(p => ({ id: p.id, name: p.product_name }))];
                        
                        if (allProducts.length === 0) {
                            suggestionsDiv.innerHTML = `<div class="p-3 text-sm"><p class="text-gray-500 mb-2">Смазка не найдена</p><button type="button" onclick="window.addCustomWaxProduct('${inputId}', '${query.replace(/'/g, "\\'")}')" class="w-full bg-teal-50 text-teal-700 px-3 py-2 rounded-lg text-sm">+ Добавить новую смазку "${query}"</button></div>`;
                            suggestionsDiv.classList.remove('hidden'); return;
                        }
                        
                        suggestionsDiv.innerHTML = allProducts.map(p => `<div class="suggestion-item px-4 py-2 hover:bg-teal-50 cursor-pointer border-b last:border-0" data-id="${p.id}" data-name="${p.name}"><span class="font-medium">${p.name}</span></div>`).join('');
                        suggestionsDiv.classList.remove('hidden');
                        
                        suggestionsDiv.querySelectorAll('.suggestion-item').forEach(el => {
                            el.addEventListener('click', () => {
                                input.value = el.dataset.name;
                                productIdField.value = el.dataset.id;
                                isCustomField.value = 'false';
                                suggestionsDiv.classList.add('hidden');
                            });
                        });
                    }, 300);
                });
                
                document.addEventListener('click', (e) => {
                    if (!input.contains(e.target) && !suggestionsDiv.contains(e.target)) suggestionsDiv.classList.add('hidden');
                });
            }

            window.addCustomWaxBrand = async function(inputId, brandName) {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) { alert('Войдите в систему'); return; }
                const { error } = await supabase.from('user_wax_brands').insert({ user_id: user.id, name: brandName, status: 'pending' });
                if (error) { alert(error.code === '23505' ? 'Этот бренд уже есть или ожидает модерации' : 'Не удалось добавить бренд'); return; }
                document.getElementById(inputId).value = brandName;
                alert(`Бренд "${brandName}" отправлен на модерацию`);
            };

            window.addCustomWaxProduct = async function(inputId, productName) {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) { alert('Войдите в систему'); return; }
                const brandName = document.querySelector(`[id^="${inputId.replace('Name', 'Brand')}"]`)?.value;
                if (!brandName) { alert('Сначала укажите бренд'); return; }
                const { error } = await supabase.from('user_wax_products').insert({ user_id: user.id, brand_name: brandName, product_name: productName, status: 'pending' });
                if (error) { alert('Не удалось добавить смазку'); return; }
                document.getElementById(inputId).value = productName;
                alert(`Смазка "${productName}" отправлена на модерацию`);
            };

            function renderLayers() {
                const container = document.getElementById('waxLayers');
                container.innerHTML = '';
                for (let i = 0; i < layerCount; i++) {
                    const isGrip = reportType.value === 'grip';
                    const layerLabel = isGrip ? ['База (грунт)', 'Основа', 'Финиш'][i] || `Слой ${i+1}` : `Слой ${i+1}`;
                    const brandInputId = `layer${i}WaxBrandInput`;
                    const brandSuggestionsId = `layer${i}BrandSuggestions`;
                    const brandIdId = `layer${i}WaxBrandId`;
                    const isCustomBrandId = `layer${i}IsCustomBrand`;
                    const nameInputId = `layer${i}WaxNameInput`;
                    const nameSuggestionsId = `layer${i}NameSuggestions`;
                    const nameIdId = `layer${i}WaxNameId`;
                    const isCustomNameId = `layer${i}IsCustomName`;
                    
                    container.innerHTML += `
                        <div class="border rounded-xl p-3 mb-3 bg-gray-50">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-medium text-sm layer-header">${layerLabel}</span>
                                ${i > 0 ? `<button type="button" class="remove-layer text-red-500 text-sm" data-index="${i}">✕</button>` : ''}
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="relative">
                                    <input type="text" id="${brandInputId}" placeholder="Бренд" class="layer-brand border rounded-lg p-2" autocomplete="off">
                                    <input type="hidden" id="${brandIdId}"><input type="hidden" id="${isCustomBrandId}" value="false">
                                    <div id="${brandSuggestionsId}" class="absolute z-40 w-full bg-white border rounded-xl shadow-lg mt-1 hidden max-h-60 overflow-y-auto"></div>
                                </div>
                                <div class="relative">
                                    <input type="text" id="${nameInputId}" placeholder="Название" class="layer-name border rounded-lg p-2" autocomplete="off">
                                    <input type="hidden" id="${nameIdId}"><input type="hidden" id="${isCustomNameId}" value="false">
                                    <div id="${nameSuggestionsId}" class="absolute z-40 w-full bg-white border rounded-xl shadow-lg mt-1 hidden max-h-60 overflow-y-auto"></div>
                                </div>
                                <input type="text" placeholder="Диапазон (-2/-8)" class="layer-range border rounded-lg p-2">
                                <input type="text" placeholder="Примечание" class="layer-notes border rounded-lg p-2">
                            </div>
                        </div>
                    `;
                }
                
                for (let i = 0; i < layerCount; i++) {
                    initWaxBrandAutocomplete(`layer${i}WaxBrandInput`, `layer${i}BrandSuggestions`, `layer${i}WaxBrandId`, `layer${i}IsCustomBrand`);
                    initWaxProductAutocomplete(`layer${i}WaxNameInput`, `layer${i}NameSuggestions`, `layer${i}WaxNameId`, `layer${i}IsCustomName`, `layer${i}WaxBrandInput`);
                }
                
                document.querySelectorAll('.remove-layer').forEach(btn => {
                    btn.addEventListener('click', () => { layerCount--; renderLayers(); updateLayerLabels(); });
                });
            }

            document.getElementById('addLayer').addEventListener('click', () => {
                if (layerCount < 3) { layerCount++; renderLayers(); updateLayerLabels(); }
            });

            // Автокомплит городов
            function initCityAutocomplete() {
                const cityInput = document.getElementById('cityInput');
                const suggestionsDiv = document.getElementById('citySuggestions');
                let debounceTimer;
                
                cityInput.addEventListener('input', async (e) => {
                    clearTimeout(debounceTimer);
                    const query = e.target.value.trim();
                    if (query.length < 2) { suggestionsDiv.classList.add('hidden'); return; }
                    
                    debounceTimer = setTimeout(async () => {
                        const { data: cities } = await supabase.from('cities').select('id, name, region_name, population, label').ilike('name', `${query}%`).order('population', { ascending: false }).limit(8);
                        if (!cities || cities.length === 0) {
                            suggestionsDiv.innerHTML = '<div class="px-4 py-2 text-gray-500">Город не найден</div>';
                            suggestionsDiv.classList.remove('hidden'); return;
                        }
                        
                        suggestionsDiv.innerHTML = cities.map(city => `
                            <div class="suggestion-item px-4 py-2 hover:bg-teal-50 cursor-pointer border-b last:border-0 flex justify-between items-center" data-id="${city.id}" data-name="${city.name}" data-region="${city.region_name}" data-label="${city.label}">
                                <span><span class="font-medium">${city.name}</span><span class="text-sm text-gray-500 ml-2">${city.region_name}</span></span>
                            </div>
                        `).join('');
                        suggestionsDiv.classList.remove('hidden');
                        
                        document.querySelectorAll('#citySuggestions .suggestion-item').forEach(el => {
                            el.addEventListener('click', () => {
                                cityInput.value = el.dataset.label || `${el.dataset.name} (${el.dataset.region})`;
                                document.getElementById('cityId').value = el.dataset.id;
                                document.getElementById('cityRegion').value = el.dataset.region;
                                suggestionsDiv.classList.add('hidden');
                            });
                        });
                    }, 300);
                });
                
                document.addEventListener('click', (e) => {
                    if (!cityInput.contains(e.target) && !suggestionsDiv.contains(e.target)) suggestionsDiv.classList.add('hidden');
                });
            }

            // Автокомплит брендов лыж
            function initBrandAutocomplete() {
                const brandInput = document.getElementById('skiBrandInput');
                const suggestionsDiv = document.getElementById('brandSuggestions');
                const brandIdInput = document.getElementById('skiBrandId');
                const isCustomBrand = document.getElementById('isCustomBrand');
                let debounceTimer;
                
                brandInput.addEventListener('input', async (e) => {
                    clearTimeout(debounceTimer);
                    const query = e.target.value.trim();
                    if (query.length < 1) { suggestionsDiv.classList.add('hidden'); return; }
                    
                    debounceTimer = setTimeout(async () => {
                        const { data: brands } = await supabase.from('ski_brands').select('id, name').ilike('name', `${query}%`).order('sort_order').limit(8);
                        const { data: userBrands } = await supabase.from('user_ski_brands').select('id, name').ilike('name', `${query}%`).eq('status', 'approved').limit(5);
                        const allBrands = [...(brands || []), ...(userBrands || [])];
                        
                        if (allBrands.length === 0) {
                            suggestionsDiv.innerHTML = `<div class="p-3 text-sm"><p class="text-gray-500 mb-2">Бренд не найден</p><button type="button" onclick="window.addCustomSkiBrand('${query.replace(/'/g, "\\'")}')" class="w-full bg-teal-50 text-teal-700 px-3 py-2 rounded-lg text-sm">+ Добавить новый бренд "${query}"</button></div>`;
                            suggestionsDiv.classList.remove('hidden'); return;
                        }
                        
                        suggestionsDiv.innerHTML = allBrands.map(b => `<div class="suggestion-item px-4 py-2 hover:bg-teal-50 cursor-pointer border-b last:border-0" data-id="${b.id}" data-name="${b.name}"><span class="font-medium">${b.name}</span></div>`).join('');
                        suggestionsDiv.classList.remove('hidden');
                        
                        document.querySelectorAll('#brandSuggestions .suggestion-item').forEach(el => {
                            el.addEventListener('click', () => {
                                brandInput.value = el.dataset.name;
                                brandIdInput.value = el.dataset.id;
                                isCustomBrand.value = 'false';
                                suggestionsDiv.classList.add('hidden');
                                loadModelsForBrand(el.dataset.id);
                            });
                        });
                    }, 300);
                });
                
                document.addEventListener('click', (e) => {
                    if (!brandInput.contains(e.target) && !suggestionsDiv.contains(e.target)) suggestionsDiv.classList.add('hidden');
                });
            }

            window.addCustomSkiBrand = async function(brandName) {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) { alert('Войдите в систему'); return; }
                const { error } = await supabase.from('user_ski_brands').insert({ user_id: user.id, name: brandName, status: 'pending' });
                if (error) { alert(error.code === '23505' ? 'Этот бренд уже есть или ожидает модерации' : 'Не удалось добавить бренд'); return; }
                document.getElementById('skiBrandInput').value = brandName;
                document.getElementById('isCustomBrand').value = 'true';
                document.getElementById('brandSuggestions').classList.add('hidden');
                alert(`Бренд "${brandName}" отправлен на модерацию`);
            };

            async function loadModelsForBrand(brandId) {
                const { data: models } = await supabase.from('ski_models').select('id, name').eq('brand_id', brandId).order('sort_order');
                window.currentBrandModels = models || [];
            }

            // Автокомплит моделей лыж
            function initModelAutocomplete() {
                const modelInput = document.getElementById('skiModelInput');
                const suggestionsDiv = document.getElementById('modelSuggestions');
                const modelIdInput = document.getElementById('skiModelId');
                const isCustomModel = document.getElementById('isCustomModel');
                let debounceTimer;
                
                modelInput.addEventListener('input', async (e) => {
                    clearTimeout(debounceTimer);
                    const query = e.target.value.trim();
                    const brandName = document.getElementById('skiBrandInput').value;
                    if (query.length < 1) { suggestionsDiv.classList.add('hidden'); return; }
                    
                    debounceTimer = setTimeout(async () => {
                        let allModels = [];
                        if (window.currentBrandModels) {
                            allModels = window.currentBrandModels.filter(m => m.name.toLowerCase().includes(query.toLowerCase()));
                        }
                        const { data: userModels } = await supabase.from('user_ski_models').select('id, model_name, brand_name').ilike('model_name', `${query}%`).eq('status', 'approved');
                        if (brandName && userModels) allModels = [...allModels, ...userModels.filter(m => m.brand_name === brandName)];
                        
                        if (allModels.length === 0) {
                            suggestionsDiv.innerHTML = `<div class="p-3 text-sm"><p class="text-gray-500 mb-2">Модель не найдена</p><button type="button" onclick="window.addCustomSkiModel('${query.replace(/'/g, "\\'")}')" class="w-full bg-teal-50 text-teal-700 px-3 py-2 rounded-lg text-sm">+ Добавить новую модель "${query}"</button></div>`;
                            suggestionsDiv.classList.remove('hidden'); return;
                        }
                        
                        suggestionsDiv.innerHTML = allModels.map(m => `<div class="suggestion-item px-4 py-2 hover:bg-teal-50 cursor-pointer border-b last:border-0" data-id="${m.id}" data-name="${m.name || m.model_name}"><span class="font-medium">${m.name || m.model_name}</span></div>`).join('');
                        suggestionsDiv.classList.remove('hidden');
                        
                        document.querySelectorAll('#modelSuggestions .suggestion-item').forEach(el => {
                            el.addEventListener('click', () => {
                                modelInput.value = el.dataset.name;
                                modelIdInput.value = el.dataset.id;
                                isCustomModel.value = 'false';
                                suggestionsDiv.classList.add('hidden');
                            });
                        });
                    }, 300);
                });
                
                document.addEventListener('click', (e) => {
                    if (!modelInput.contains(e.target) && !suggestionsDiv.contains(e.target)) suggestionsDiv.classList.add('hidden');
                });
            }

            window.addCustomSkiModel = async function(modelName) {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) { alert('Войдите в систему'); return; }
                const brandName = document.getElementById('skiBrandInput').value;
                if (!brandName) { alert('Сначала укажите бренд'); return; }
                const { error } = await supabase.from('user_ski_models').insert({ user_id: user.id, brand_name: brandName, model_name: modelName, status: 'pending' });
                if (error) { alert('Не удалось добавить модель'); return; }
                document.getElementById('skiModelInput').value = modelName;
                document.getElementById('isCustomModel').value = 'true';
                document.getElementById('modelSuggestions').classList.add('hidden');
                alert(`Модель "${modelName}" отправлена на модерацию`);
            };

            // Отправка формы
            document.getElementById('reportForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) { window.location.href = 'auth.html'; return; }

                const layers = [];
                for (let i = 0; i < layerCount; i++) {
                    const brandInput = document.getElementById(`layer${i}WaxBrandInput`);
                    const nameInput = document.getElementById(`layer${i}WaxNameInput`);
                    const rangeInput = document.querySelector(`#layer${i}WaxNameInput ~ .layer-range`);
                    const notesInput = document.querySelector(`#layer${i}WaxNameInput ~ .layer-notes`);
                    
                    if (nameInput?.value) {
                        layers.push({
                            layer_type: reportType.value === 'grip' ? ['base', 'main', 'top'][i] : `layer${i+1}`,
                            layer_order: i + 1,
                            wax_brand: brandInput?.value || null,
                            wax_name: nameInput.value,
                            temp_range: rangeInput?.value || null,
                            notes: notesInput?.value || null
                        });
                    }
                }

                if (layers.length === 0) { alert('Добавьте хотя бы один слой смазки'); return; }

                const reportData = {
                    user_id: user.id,
                    report_type: reportType.value,
                    start_date: document.getElementById('startDate').value,
                    country: document.getElementById('country').value,
                    city: document.getElementById('cityInput').value,
                    city_id: document.getElementById('cityId').value || null,
                    location_name: document.getElementById('locationName').value,
                    temp_from: parseInt(tempFrom.value),
                    temp_to: parseInt(tempTo.value),
                    weather: weatherInput.value,
                    track_condition: trackConditions[trackSlider.value - 1],
                    snow_temp: document.getElementById('snowTemp').value ? parseInt(document.getElementById('snowTemp').value) : null,
                    humidity: document.getElementById('humidity').value ? parseInt(document.getElementById('humidity').value) : null,
                    pressure: document.getElementById('pressure').value ? parseInt(document.getElementById('pressure').value) : null,
                    snow_type: snowTypes[snowSlider.value - 1],
                    ski_brand: document.getElementById('skiBrandInput').value,
                    ski_brand_id: document.getElementById('isCustomBrand').value === 'true' ? null : document.getElementById('skiBrandId').value,
                    is_custom_brand: document.getElementById('isCustomBrand').value === 'true',
                    ski_model: document.getElementById('skiModelInput').value,
                    ski_model_id: document.getElementById('isCustomModel').value === 'true' ? null : document.getElementById('skiModelId').value,
                    is_custom_model: document.getElementById('isCustomModel').value === 'true',
                    ski_base: document.getElementById('skiBase').value || null,
                    ski_structure: document.getElementById('skiStructure').value || null,
                    rating: parseInt(ratingSlider.value),
                    comment: document.getElementById('comment').value || null
                };

                const { data: report, error } = await supabase.from('reports').insert(reportData).select().single();
                if (error) {
                    document.getElementById('message').innerHTML = `<span class="text-red-600">❌ ${error.message}</span>`;
                    return;
                }

                if (layers.length) {
                    const layersWithReport = layers.map(l => ({ ...l, report_id: report.id }));
                    await supabase.from('wax_layers').insert(layersWithReport);
                }

                document.getElementById('message').innerHTML = '<span class="text-green-600">✅ Отчёт сохранён!</span>';
                setTimeout(() => window.location.href = 'index.html', 1000);
            });

            // Инициализация
            checkAuth().then(isAuth => {
                if (isAuth) {
                    renderLayers();
                    initCityAutocomplete();
                    initBrandAutocomplete();
                    initModelAutocomplete();
                }
            });
        })();
    </script>
</body>
</html>
